name: 每5分钟更新时间

on:
  schedule:
    - cron: '*/5 * * * *'  # 理论上的每一分钟执行一次
  workflow_dispatch:      # 允许你手动点击运行，方便立刻看到效果

jobs:
  update-page:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v6

      - name: 2. 修改 HTML 内容
        run: |
          # 获取当前时间（北京时间 UTC+8）
          CURRENT_TIME=$(date -d "+8 hours" "+%Y-%m-%d %H:%M:%S")
          echo "现在时间是: $CURRENT_TIME"
          # 使用 sed 命令替换 HTML 里的占位符
          sed -i "s/等待更新.../$CURRENT_TIME/g" index.html

      - name: 3. 提交并推送改动
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          # 如果文件没变动，commit 会报错，所以加个 || exit 0
          git commit -m "自动更新时间: $(date)" || exit 0
          git push

      # 如果你开启了 Pages 的自动部署，这一步推送后，网站就会自动更新